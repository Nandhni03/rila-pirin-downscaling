project:
    name: Retezat
    description: Downscaling for the Retezat mountains
    authors:
        - Filhol S.
    date: Nov 2021
    directory: 
    start: 2020-01-01
    end: 2021-08-31
    split:
        IO: False
        time: 1  # run indivudal batch in time
        space: None  # to be implemented
    extent: 
    climate: era5
    parallelization:
        downscaling_method: dask
        setting:
            multicore:
                CPU_cores: 6
            dask:
                n_workers: 6
                threads_per_worker: 1
                memory_target_fraction: 0.95
                memory_limit: 1.2GB


climate:
    era5:
        path: inputs/climate/
        product: reanalysis
        timestep: 1H
        plevels: [700,750,800,850,900,950,1000]
        download_threads: 12
        realtime: False
        data_repository: cds
        cds_output_format: netcdf
        cds_download_foramt: unarchived
        rm_daily: False
        zarr_store: ERA5.zarr
    precip_lapse_rate: True

dem:
    file: SRTM_90m_retezat.tif
    epsg: 3844
    horizon_increments: 10

sampling:
    method: toposub
    points:
        csv_file: pt_list_retezat.csv

    toposub:
        clustering_method: minibatchkmean
        n_clusters: 50
        random_seed: 2
        clustering_features: {'x':1, 'y':1, 'elevation':1, 'slope':1, 'aspect_cos':1, 'aspect_sin':1, 'svf':1}

toposcale:
    interpolation_method: idw
    pt_sampling_method: nearest
    LW_terrain_contribution: True

outputs:
    directory:
    variables: all  # list or combination name
    file:
        clean_outputs: False
        clean_FSM: True
        df_centroids: df_centroids.pck
        ds_param: ds_param.nc
        ds_solar: ds_solar.nc
        da_horizon: da_horizon.nc
        landform: landform.tif
        downscaled_pt: #down_pt_*.nc
        zarr_store: down.zarr
clean_up:
    delete_tmp_dirs: True
